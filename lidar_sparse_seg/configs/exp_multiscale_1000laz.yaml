seed: 42
num_classes: 3
voxel_size: 0.5
max_intensity: 65535.0

use_hag: true
hag_cell_size: 1.0
use_return_features: true
use_scan_angle: true
use_normal_features: true
use_roughness_feature: true
use_slope_feature: true
use_planarity_feature: true
use_linearity_feature: true
normal_cell_size: 1.0
normal_min_points: 8
roughness_scale: 1.5

crop_size: 128.0
max_points_per_crop: 250000
num_workers: 8
tile_cache_size: 8
cache_full_samples_val: true

batch_size: 1
epochs: 80
lr: 0.0005
weight_decay: 0.02
scheduler: cosine
amp: true
infer_all_non_ignored: true
output_binary_01: false
binary_positive_classes: [1, 2]

# During training, validate on a fixed subset for speed.
# Use src.validate with full split after training.
fixed_val_batches: 120
validate_max_batches: 0
early_stopping_patience: 12
early_stopping_min_delta: 0.0005
checkpoint_every_n_epochs: 5

split:
  auto_generate: true
  mode: balance_target_class
  target_train_class: 1
  min_positive_files_per_eval_split: 8
  balance_weight_alpha: 1.0
  recursive: true
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  regenerate: true

model:
  name: spconv_unet_multiscale
  base_channels: 32
  depth: 2

postprocess:
  enabled: true
  smooth_voxel_size: 1.0
  min_building_hag: 1.0
  building_class: 1
  building_fallback_class: 2
  max_ground_hag: 1.2
  ground_class: 0
  ground_fallback_class: 1
  min_vegetation_hag: 0.35
  vegetation_class: 2
  fill_unresolved_neighbors: true
  fill_grid_size: 1.0
  unresolved_train_fallback_class: 2
  unresolved_output_las_class: 0

paths:
  # Update this path to your larger dataset root (>1000 LAZ).
  data_root: \\192.168.2.26\d\5 Processamento Laser\1 TSCAN\LOTE_09\BLOCO_I
  train_split: E:/training/train_split/train.txt
  val_split: E:/training/val_split/val.txt
  test_split: E:/training/test_split/test.txt
  las_to_train: ./configs/las_to_train.json
  classes: ./configs/classes.json
  ignore_las_classes: ./configs/ignore_las_classes_infer_7_only.json
  checkpoints_dir: E:/training/checkpoints/main_multiscale_1000laz
  logs_dir: E:/training/checkpoints/main_multiscale_1000laz/logs
