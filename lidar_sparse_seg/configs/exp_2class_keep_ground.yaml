seed: 42
num_classes: 2
voxel_size: 0.5
max_intensity: 65535.0

use_hag: true
hag_cell_size: 1.0
use_return_features: true
use_scan_angle: true
use_normal_features: true
use_roughness_feature: true
use_slope_feature: true
use_planarity_feature: true
use_linearity_feature: true
normal_cell_size: 1.0
normal_min_points: 8
roughness_scale: 1.5

crop_size: 96.0
max_points_per_crop: 250000
num_workers: 6
tile_cache_size: 4
cache_full_samples_val: false

batch_size: 1
epochs: 60
lr: 0.0007
weight_decay: 0.02
scheduler: cosine
amp: true
fixed_val_batches: 0
validate_max_batches: 0
early_stopping_patience: 10
early_stopping_min_delta: 0.0005
checkpoint_every_n_epochs: 5

split:
  auto_generate: true
  mode: balance_target_class
  target_train_class: 0
  min_positive_files_per_eval_split: 8
  balance_weight_alpha: 1.0
  recursive: true
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  regenerate: false

model:
  name: spconv_unet
  base_channels: 32
  depth: 4

# Inference behavior for "ground fixed" workflow.
infer_all_non_ignored: true
fixed_ground_mode: true
fixed_ground_las_class: 2
output_binary_01: false

postprocess:
  enabled: true
  smooth_voxel_size: 1.0
  min_building_hag: 0.8
  building_class: 0
  building_fallback_class: 1
  max_ground_hag: -1.0
  ground_class: 0
  ground_fallback_class: 1
  min_vegetation_hag: -1.0
  vegetation_class: 1
  fill_unresolved_neighbors: true
  fill_grid_size: 1.0
  unresolved_train_fallback_class: 1
  unresolved_output_las_class: 3

paths:
  data_root: \\192.168.2.26\d\5 Processamento Laser\1 TSCAN\LOTE_09\BLOCO_I
  train_split: E:/training/train_split/train.txt
  val_split: E:/training/val_split/val.txt
  test_split: E:/training/test_split/test.txt
  las_to_train: ./configs/las_to_train_2class_keep_ground.json
  classes: ./configs/classes_2class_keep_ground.json
  ignore_las_classes: ./configs/ignore_las_classes_infer_7_only.json
  checkpoints_dir: E:/training/checkpoints/main_2class_keep_ground
  logs_dir: E:/training/checkpoints/main_2class_keep_ground/logs
